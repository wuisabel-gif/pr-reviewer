name: Second-Opinion Agent-Agnostic PR Review
description: Agent-agnostic AI pull request reviews with interchangeable model backends
author: wuisabel-gif

inputs:
  api-key:
    description: API key for the selected review provider; optional for unauthenticated local services
    required: false
    default: ""
  provider:
    description: anthropic, openai-responses, openai-compatible, or webhook
    required: false
    default: anthropic
  model:
    description: Provider-specific model override
    required: false
    default: ""
  base-url:
    description: Base URL for OpenAI-compatible APIs
    required: false
    default: ""
  endpoint:
    description: Exact endpoint URL for the generic webhook adapter
    required: false
    default: ""
  auth-header:
    description: Authentication header for compatible APIs and webhooks
    required: false
    default: Authorization
  auth-scheme:
    description: Authentication scheme, such as Bearer or none for a raw key
    required: false
    default: Bearer
  response-json-pointer:
    description: Optional JSON Pointer locating a normalized review in a webhook response
    required: false
    default: ""
  passes:
    description: Number of independent model passes, from 1 to 7
    required: false
    default: "1"
  vote-threshold:
    description: Votes required to keep a finding; defaults to a strict majority
    required: false
    default: ""
  context-bytes:
    description: Maximum repository-context bytes; set to 0 to disable context
    required: false
    default: "60000"
  bot-login:
    description: GitHub login whose prior comments are trusted for deduplication
    required: false
    default: "github-actions[bot]"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

    - name: Run second-opinion
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        REVIEW_API_KEY: ${{ inputs.api-key }}
        REVIEW_PROVIDER: ${{ inputs.provider }}
        REVIEW_MODEL: ${{ inputs.model }}
        REVIEW_BASE_URL: ${{ inputs.base-url }}
        REVIEW_ENDPOINT: ${{ inputs.endpoint }}
        REVIEW_AUTH_HEADER: ${{ inputs.auth-header }}
        REVIEW_AUTH_SCHEME: ${{ inputs.auth-scheme }}
        REVIEW_RESPONSE_JSON_POINTER: ${{ inputs.response-json-pointer }}
        REVIEW_PASSES: ${{ inputs.passes }}
        REVIEW_VOTE_THRESHOLD: ${{ inputs.vote-threshold }}
        REVIEW_CONTEXT_BYTES: ${{ inputs.context-bytes }}
        REVIEW_BOT_LOGIN: ${{ inputs.bot-login }}
        SECOND_OPINION_ACTION_PATH: ${{ github.action_path }}
      run: cargo run --release --locked --manifest-path "$SECOND_OPINION_ACTION_PATH/Cargo.toml"

branding:
  icon: eye
  color: purple
